<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>記事を編集 - My Simple Blog</title>
    <style>
        :root {
            --bg-color: #f7f9fa;
            --card-bg: #ffffff;
            --text-main: #2c3e50;
            --accent-color: #3498db;
            --focus-color: #3498db;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--bg-color); color: var(--text-main); line-height: 1.7; margin: 0; padding: 0; }
        .container { max-width: 600px; margin: 0 auto; padding: 40px 20px; }
        .form-card { background: var(--card-bg); border-radius: 12px; padding: 40px; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03); }
        h1 { font-size: 24px; margin-top: 0; margin-bottom: 30px; border-left: 4px solid var(--accent-color); padding-left: 12px; }
        .form-group { margin-bottom: 25px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; font-size: 14px; }
        input[type="text"], textarea, input[type="file"] { width: 100%; padding: 12px; box-sizing: border-box; border: 1px solid #dee2e6; border-radius: 6px; font-size: 16px; background-color: #fcfcfc; transition: border-color 0.2s, box-shadow 0.2s; }
        input[type="text"]:focus, textarea:focus { outline: none; border-color: var(--focus-color); box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1); background-color: #fff; }
        textarea { height: 240px; resize: vertical; }
        .current-image-info { font-size: 13px; color: #7f8c8d; margin-top: 5px; }
        .actions { display: flex; justify-content: space-between; align-items: center; margin-top: 30px; }
        .btn-submit { background-color: var(--accent-color); color: white; padding: 12px 30px; border: none; border-radius: 25px; cursor: pointer; font-size: 16px; font-weight: bold; box-shadow: 0 4px 6px rgba(52, 152, 219, 0.2); transition: background-color 0.2s; }
        .btn-submit:hover { background-color: #2980b9; }
        .back-link { color: #7f8c8d; text-decoration: none; font-size: 14px; }
        .back-link:hover { color: #34495e; }
    </style>
</head>
<body>
    <div class="container">
        <div class="form-card">
            <h1>記事を編集する</h1>
            <form method="POST" enctype="multipart/form-data">
                
                <div class="form-group">
                    <label for="title">タイトル</label>
                    <input type="text" id="title" name="title" value="{{ post.title }}" required>
                </div>

                <div class="form-group">
                    <label for="category">カテゴリー（タグ）</label>
                    <input type="text" id="category" name="category" value="{{ post.category | default('未分類') }}">
                </div>

                <div class="form-group">
                    <label for="image">アイキャッチ画像を変更 (新しく選ぶと上書きされます)</label>
                    <input type="file" id="image" name="image" accept="image/*">
                    {% if post.image %}
                    <div class="current-image-info">現在の画像: {{ post.image }}</div>
                    {% endif %}
                </div>

                <div class="form-group">
                    <label for="content">本文</label>
                    <textarea id="content" name="content" required>{{ post.content }}</textarea>
                </div>

                <div class="actions">
                    <a href="/" class="back-link">← キャンセル</a>
                    <button type="submit" class="btn-submit">変更を保存する</button>
                </div>

            </form>
        </div>
    </div>
</body>
</html>
