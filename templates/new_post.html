<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>記事を書く - My Simple Blog</title>
    <style>
        :root { --bg-color: #f7f9fa; --card-bg: #ffffff; --text-main: #2c3e50; --accent-color: #2ecc71; --focus-color: #3498db; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--bg-color); color: var(--text-main); line-height: 1.7; margin: 0; padding: 0; }
        .container { max-width: 600px; margin: 0 auto; padding: 40px 20px; }
        .form-card { background: var(--card-bg); border-radius: 12px; padding: 40px; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03); }
        h1 { font-size: 24px; margin-top: 0; margin-bottom: 30px; border-left: 4px solid var(--accent-color); padding-left: 12px; }
        .form-group { margin-bottom: 25px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; font-size: 14px; }
        input[type="text"], textarea, input[type="file"], select { width: 100%; padding: 12px; box-sizing: border-box; border: 1px solid #dee2e6; border-radius: 6px; font-size: 16px; background-color: #fcfcfc; }
        input[type="text"]:focus, textarea:focus, select:focus { outline: none; border-color: var(--focus-color); box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1); background-color: #fff; }
        textarea { height: 240px; resize: vertical; }
        .sub-label { font-size: 12px; color: #7f8c8d; margin-top: 4px; display: block; }
        .actions { display: flex; justify-content: space-between; align-items: center; margin-top: 30px; }
        .btn-submit { background-color: var(--accent-color); color: white; padding: 12px 30px; border: none; border-radius: 25px; cursor: pointer; font-size: 16px; font-weight: bold; transition: background-color 0.2s; }
        .btn-submit:hover { background-color: #27ae60; }
        .back-link { color: #7f8c8d; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="form-card">
            <h1>新しい記事を書く</h1>
            <form method="POST" enctype="multipart/form-data">
                <div class="form-group">
                    <label for="title">タイトル</label>
                    <input type="text" id="title" name="title" required placeholder="心に浮かんだタイトルを...">
                </div>
                
                <div class="form-group">
                    <label>カテゴリー（タグ）</label>
                    
                    <select name="existing_category" style="margin-bottom: 10px;">
                        <option value="">-- 既存のカテゴリーから選ぶ --</option>
                        {% for cat in categories %}
                        <option value="{{ cat }}">{{ cat }}</option>
                        {% endfor %}
                    </select>
                    
                    <input type="text" name="new_category" placeholder="新しくカテゴリーを追加する場合に入力">
                    <span class="sub-label">※新しく追加したい単語がある場合は下の欄に入力してください。下の入力が優先されます。</span>
                </div>

                <div class="form-group">
                    <label for="image">アイキャッチ画像 (写真やイラスト)</label>
                    <input type="file" id="image" name="image" accept="image/*">
                </div>
                <div class="form-group">
                    <label for="content">本文</label>
                    <textarea id="content" name="content" required placeholder="ここに自由に文章を書きましょう..."></textarea>
                </div>
                <div class="actions">
                    <a href="/" class="back-link">← 戻る</a>
                    <button type="submit" class="btn-submit">記事を公開する</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
